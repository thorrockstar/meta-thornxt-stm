# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*.bb \
	    ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "thornxt"
BBFILE_PATTERN_thornxt = "^${LAYERDIR}/"
BBFILE_PRIORITY_thornxt = "10"

LAYERSERIES_COMPAT_thornxt = "scarthgap"

MACHINE_FEATURES:remove = "bluetooth wifi fw-update"
DISTRO_FEATURES:remove = "zeroconf ofono bluetooth 3g nfc"

# Remove unwanted dependencies from the ST layer.
LAYERDEPENDS_st-openstlinux:remove = "webserver gnome-layer multimedia-layer"

# Mask out unwanted recipes.
BBMASK += "/meta-st-openstlinux/recipes-multimedia/gstreamer/"
BBMASK += "/meta-st-openstlinux/recipes-webadmin/"
BBMASK += "/meta-st-openstlinux/recipes-samples/"
BBMASK += "/meta-st-openstlinux/oe-core/recipes-gnome/"
BBMASK += "/meta-st-openstlinux/oe-core/recipes-core/systemd/"
BBMASK += "meta-st-openstlinux/recipes-multimedia/libcamera/libcamera-stm32mp_%.bb"

# NOTE
# we set priority higher than the STM layer
